<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" font-family="SFMono-Regular, Consolas, monospace">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5c6370"/>
    </marker>
  </defs>
  <rect width="1200" height="260" fill="#0f1115"/>
  <text x="600" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#f2f4f8">Submission Lifecycle</text>

  <!-- steps -->
  <g>
    <rect x="30" y="80" width="190" height="100" rx="10" fill="#161a22" stroke="#61dafb" stroke-width="1.5"/>
    <text x="125" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#61dafb">1. Write</text>
    <text x="125" y="140" text-anchor="middle" font-size="11" fill="#9aa2b1">code + lang</text>
    <text x="125" y="157" text-anchor="middle" font-size="11" fill="#9aa2b1">POST /api/run/</text>
  </g>

  <g>
    <rect x="250" y="80" width="190" height="100" rx="10" fill="#161a22" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="345" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24">2. Save</text>
    <text x="345" y="140" text-anchor="middle" font-size="11" fill="#9aa2b1">uuid.{lang} file</text>
    <text x="345" y="157" text-anchor="middle" font-size="11" fill="#9aa2b1">InputCodes/</text>
  </g>

  <g>
    <rect x="470" y="80" width="190" height="100" rx="10" fill="#161a22" stroke="#f472b6" stroke-width="1.5"/>
    <text x="565" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#f9a8d4">3. Compile</text>
    <text x="565" y="140" text-anchor="middle" font-size="11" fill="#9aa2b1">gcc / g++ / javac</text>
    <text x="565" y="157" text-anchor="middle" font-size="11" fill="#9aa2b1">(skipped for py)</text>
  </g>

  <g>
    <rect x="690" y="80" width="190" height="100" rx="10" fill="#161a22" stroke="#818cf8" stroke-width="1.5"/>
    <text x="785" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#a5b4fc">4. Run</text>
    <text x="785" y="140" text-anchor="middle" font-size="11" fill="#9aa2b1">stdin = testcaseinput</text>
    <text x="785" y="157" text-anchor="middle" font-size="11" fill="#9aa2b1">stdout to Output/</text>
  </g>

  <g>
    <rect x="910" y="80" width="260" height="100" rx="10" fill="#132a1f" stroke="#34d399" stroke-width="1.5"/>
    <text x="1040" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#6ee7b7">5. Compare &amp; verdict</text>
    <text x="1040" y="140" text-anchor="middle" font-size="11" fill="#9aa2b1">diff vs testcaseoutput</text>
    <text x="1040" y="157" text-anchor="middle" font-size="11" fill="#9aa2b1">Accepted / Wrong Answer</text>
  </g>

  <line x1="220" y1="130" x2="248" y2="130" stroke="#5c6370" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="440" y1="130" x2="468" y2="130" stroke="#5c6370" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="660" y1="130" x2="688" y2="130" stroke="#5c6370" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="880" y1="130" x2="908" y2="130" stroke="#5c6370" stroke-width="2" marker-end="url(#arrow2)"/>

  <text x="600" y="225" text-anchor="middle" font-size="11.5" fill="#5c6370">Each submission also writes a Solution row so verdict history is queryable per question</text>
</svg>
